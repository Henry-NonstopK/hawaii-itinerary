<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Hong's 햅삐한 하와이여행</title>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800;900&display=swap");

    :root {
      color-scheme: light;
      --ink: #10242d;
      --muted: #5f6f76;
      --line: rgba(15, 70, 84, 0.14);
      --paper: #fffdf7;
      --wash: #edf8f6;
      --aqua: #1aa1a9;
      --aqua-dark: #0d5963;
      --lagoon: #8edfd8;
      --coral: #ff8a63;
      --hibiscus: #cb4f73;
      --sun: #f5bf5b;
      --sand: #fff2d4;
      --palm: #275742;
      --shadow: 0 24px 56px rgba(15, 65, 76, 0.14);
    }

    * { box-sizing: border-box; }
    html {
      scroll-behavior: smooth;
      overscroll-behavior: none;
    }
    body {
      margin: 0;
      font-family: "Manrope", "Segoe UI", sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
      overscroll-behavior: none;
      background:
        radial-gradient(circle at 14% 8%, rgba(245, 191, 91, 0.3), transparent 18rem),
        radial-gradient(circle at 82% 0%, rgba(142, 223, 216, 0.55), transparent 22rem),
        radial-gradient(circle at 100% 72%, rgba(255, 138, 99, 0.12), transparent 18rem),
        linear-gradient(180deg, #e3fbf7 0%, #fff8ea 44%, #f4fbf8 100%);
      color: var(--ink);
      line-height: 1.5;
    }
    body::before,
    body::after {
      content: "";
      position: fixed;
      pointer-events: none;
      z-index: 0;
      border-radius: 50%;
      filter: blur(10px);
      opacity: 0.8;
    }
    body::before {
      left: -8rem;
      top: 20vh;
      width: 18rem;
      height: 18rem;
      background: radial-gradient(circle, rgba(142, 223, 216, 0.24), transparent 70%);
    }
    body::after {
      right: -7rem;
      top: 8vh;
      width: 16rem;
      height: 16rem;
      background: radial-gradient(circle, rgba(255, 138, 99, 0.2), transparent 70%);
    }
    button, input, textarea, select { font: inherit; }
    button { cursor: pointer; }
    a { color: inherit; }

    .shell {
      width: min(100%, 1040px);
      margin: 0 auto;
      padding: 16px 14px 56px;
      position: relative;
      z-index: 1;
    }
    .view-shell {
      position: relative;
      overflow: hidden;
      touch-action: pan-y pinch-zoom;
      overscroll-behavior: contain;
    }
    .view-panel {
      position: relative;
      padding-top: 2px;
      touch-action: pan-y pinch-zoom;
      will-change: transform, opacity;
      transform: translate3d(var(--swipe-offset, 0px), 0, 0) scale(var(--swipe-scale, 1));
      transition: transform 640ms cubic-bezier(0.22, 1, 0.36, 1), opacity 260ms ease;
      animation: panelFadeIn 640ms cubic-bezier(0.22, 1, 0.36, 1);
    }
    .view-panel.is-dragging {
      transition: none;
    }
    .view-panel.swipe-forward {
      animation-name: slideForward;
    }
    .view-panel.swipe-backward {
      animation-name: slideBackward;
    }
    @keyframes panelFadeIn {
      from {
        opacity: 0;
        transform: translate3d(0, 12px, 0) scale(0.995);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }
    @keyframes slideForward {
      from {
        opacity: 0;
        transform: translate3d(14px, 0, 0) scale(0.996);
      }
      to {
        opacity: 1;
        transform: translate3d(0, 0, 0) scale(1);
      }
    }
    @keyframes slideBackward {
      from {
        opacity: 0;
        transform: translate3d(-14px, 0, 0) scale(0.996);
      }
      to {
        opacity: 1;
        transform: translate3d(0, 0, 0) scale(1);
      }
    }
    .hero {
      min-height: 56svh;
      display: grid;
      gap: 20px;
      align-content: end;
      padding: 14px 2px 18px;
    }
    .hero-visual {
      min-height: 32svh;
      overflow: hidden;
      border-radius: 30px;
      background:
        linear-gradient(180deg, rgba(12, 42, 50, 0.08), rgba(12, 42, 50, 0.02)),
        url("./assets/hawaii-hero.png") center center / cover no-repeat;
      box-shadow: var(--shadow);
      position: relative;
      isolation: isolate;
      filter: saturate(1.02);
    }
    .splash {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: grid;
      place-items: center;
      padding: 20px;
      background:
        radial-gradient(circle at 20% 20%, rgba(142, 223, 216, 0.34), transparent 18rem),
        radial-gradient(circle at 80% 24%, rgba(255, 138, 99, 0.26), transparent 16rem),
        linear-gradient(180deg, rgba(245, 191, 91, 0.22), rgba(255, 253, 247, 0.94));
      backdrop-filter: blur(20px);
      animation: splashFadeOut 260ms ease forwards;
      animation-delay: 1.12s;
      pointer-events: none;
    }
    .splash-card {
      width: min(100%, 390px);
      padding: 24px 22px 22px;
      border-radius: 32px;
      background: rgba(255, 253, 248, 0.92);
      border: 1px solid rgba(15, 70, 84, 0.12);
      box-shadow: 0 24px 70px rgba(15, 65, 76, 0.18);
      text-align: center;
      transform-origin: center;
      animation: splashRise 780ms cubic-bezier(0.16, 1, 0.3, 1);
    }
    .splash-mark {
      width: 74px;
      height: 74px;
      margin: 0 auto 14px;
      border-radius: 24px 24px 12px 12px;
      background:
        radial-gradient(circle at 50% 34%, rgba(255, 255, 255, 0.9) 0 16%, transparent 17%),
        linear-gradient(135deg, #7fded7 0%, #f7dc93 48%, #ff8b63 100%);
      box-shadow: 0 14px 30px rgba(27, 138, 148, 0.18);
      position: relative;
      overflow: hidden;
    }
    .splash-mark::before,
    .splash-mark::after {
      content: "";
      position: absolute;
      inset: auto auto 10px 50%;
      width: 120px;
      height: 28px;
      border-radius: 999px;
      transform: translateX(-50%);
      background: rgba(255, 253, 248, 0.78);
    }
    .splash-mark::after {
      inset: auto auto 0 50%;
      width: 92px;
      height: 22px;
      background: rgba(14, 89, 99, 0.34);
    }
    .splash-kicker {
      margin: 0 0 8px;
      color: var(--hibiscus);
      font-size: 0.76rem;
      font-weight: 900;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }
    .splash h2 {
      margin: 0;
      color: var(--aqua-dark);
      font-size: clamp(2rem, 8vw, 3rem);
      font-weight: 900;
      line-height: 0.95;
      letter-spacing: -0.03em;
    }
    .splash p {
      margin: 12px 0 0;
      color: var(--muted);
      font-size: 0.95rem;
    }
    .splash-bar {
      width: min(160px, 52%);
      height: 6px;
      margin: 18px auto 0;
      border-radius: 999px;
      background: rgba(15, 70, 84, 0.08);
      overflow: hidden;
    }
    .splash-bar::before {
      content: "";
      display: block;
      width: 44%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(135deg, var(--aqua), var(--coral));
      animation: splashBar 1.05s ease-in-out infinite;
    }
    @keyframes splashRise {
      from {
        opacity: 0;
        transform: translateY(18px) scale(0.96);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }
    @keyframes splashFadeOut {
      to {
        opacity: 0;
        visibility: hidden;
      }
    }
    @keyframes splashBar {
      0%, 100% { transform: translateX(0); }
      50% { transform: translateX(122%); }
    }
    .eyebrow {
      margin: 6px 0 8px;
      color: var(--hibiscus);
      font-size: 0.78rem;
      font-weight: 900;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }
    h1 {
      margin: 0;
      max-width: 11ch;
      font-size: clamp(2.55rem, 11vw, 5.8rem);
      font-weight: 900;
      line-height: 0.92;
      letter-spacing: -0.03em;
      color: var(--aqua-dark);
      text-wrap: balance;
    }
    .subtitle {
      margin: 14px 0 0;
      color: var(--muted);
      font-size: 1.02rem;
      overflow-wrap: anywhere;
    }
    .quick-facts {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-top: 16px;
    }
    .fact {
      min-height: 68px;
      padding: 12px 12px 11px;
      border: 1px solid rgba(27, 138, 148, 0.14);
      border-radius: 18px;
      background:
        linear-gradient(180deg, rgba(255, 253, 248, 0.92), rgba(255, 247, 236, 0.86));
      box-shadow: 0 10px 24px rgba(18, 89, 103, 0.08);
      backdrop-filter: blur(10px);
      overflow-wrap: anywhere;
    }
    .fact b {
      display: block;
      margin-bottom: 3px;
      color: var(--aqua-dark);
      font-size: 0.74rem;
      font-weight: 900;
    }
    .fact span { font-size: 0.9rem; font-weight: 800; }

    .tabbar {
      position: sticky;
      top: 10px;
      z-index: 5;
      display: flex;
      gap: 8px;
      overflow-x: auto;
      margin: 0 -14px 16px;
      padding: 12px 14px 12px;
      background: rgba(255, 253, 247, 0.72);
      border-block: 1px solid rgba(27, 138, 148, 0.14);
      box-shadow: 0 10px 24px rgba(18, 89, 103, 0.06);
      backdrop-filter: blur(18px);
      scrollbar-width: none;
      overscroll-behavior: contain;
      -webkit-overflow-scrolling: touch;
    }
    .tabbar::-webkit-scrollbar { display: none; }
    .tabbar::after {
      content: "";
      flex: 0 0 8px;
    }
    .tab {
      flex: 0 0 auto;
      min-height: 44px;
      padding: 10px 18px;
      border: 1px solid rgba(17, 101, 112, 0.18);
      border-radius: 999px;
      background: rgba(255, 253, 248, 0.9);
      color: var(--aqua-dark);
      font-size: 0.82rem;
      font-weight: 900;
      line-height: 1.1;
      text-align: center;
      white-space: nowrap;
      box-shadow: 0 9px 20px rgba(18, 89, 103, 0.08);
      transition: transform 140ms ease, box-shadow 140ms ease, filter 140ms ease;
    }
    .tab.active {
      border-color: var(--aqua);
      background: linear-gradient(135deg, var(--aqua), var(--aqua-dark));
      color: #fff;
      box-shadow: 0 9px 20px rgba(27, 138, 148, 0.22);
    }
    .section-title {
      margin: 6px 4px 10px;
      font-size: 1.18rem;
      font-weight: 900;
      letter-spacing: 0;
    }
    .section-kicker {
      margin: -2px 4px 12px;
      color: var(--muted);
      font-size: 0.88rem;
      overflow-wrap: anywhere;
    }
    .tab-page {
      display: grid;
      gap: 14px;
      padding: 16px;
      border: 1px solid rgba(15, 70, 84, 0.1);
      border-radius: 28px;
      background: rgba(255, 253, 248, 0.94);
      box-shadow: 0 16px 36px rgba(23, 49, 59, 0.08);
      backdrop-filter: blur(14px);
    }
    .tab-page .section-title {
      margin: 0 2px 2px;
    }
    .tab-page .section-kicker {
      margin: -6px 2px 0;
    }

    .toolbar {
      display: flex;
      gap: 7px;
      overflow-x: auto;
      scroll-snap-type: x proximity;
      margin: 0 -14px 14px;
      padding: 10px 14px 12px;
      background: linear-gradient(180deg, rgba(255, 253, 247, 0.84), rgba(255, 250, 243, 0.94));
      border-block: 1px solid rgba(27, 138, 148, 0.12);
      scrollbar-width: none;
      overscroll-behavior: contain;
      -webkit-overflow-scrolling: touch;
    }
    .toolbar::-webkit-scrollbar { display: none; }
    .chip {
      flex: 0 0 auto;
      min-height: 44px;
      padding: 10px 16px;
      border: 1px solid rgba(17, 101, 112, 0.18);
      border-radius: 999px;
      background: rgba(255, 253, 248, 0.92);
      color: var(--aqua-dark);
      font-size: 0.86rem;
      font-weight: 850;
      white-space: nowrap;
      box-shadow: 0 8px 18px rgba(18, 89, 103, 0.05);
      transition: transform 140ms ease, box-shadow 140ms ease;
    }
    .chip.active {
      background: linear-gradient(135deg, var(--aqua-dark), var(--palm));
      color: #fff;
      border-color: var(--aqua-dark);
    }

    .card, .day-card, .panel, .post, .chat-login, .chat-phone, .gallery-shell {
      border-radius: 30px;
      background: rgba(255, 253, 248, 0.94);
      border: 1px solid rgba(15, 70, 84, 0.12);
      box-shadow: 0 16px 38px rgba(23, 49, 59, 0.08);
      backdrop-filter: blur(14px);
    }
    .day-card { margin-bottom: 16px; padding: 16px; }
    .day-card {
      position: relative;
      overflow: hidden;
      background:
        linear-gradient(180deg, rgba(255, 253, 248, 0.98), rgba(255, 247, 236, 0.96));
    }
    .day-card::before {
      content: "";
      position: absolute;
      inset: 0 0 auto 0;
      height: 6px;
      background: linear-gradient(135deg, var(--aqua), var(--coral));
    }
    .day-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
      padding-top: 4px;
    }
    .date {
      margin: 0 0 2px;
      color: var(--hibiscus);
      font-size: 0.76rem;
      font-weight: 900;
    }
    .day-card h3 {
      margin: 0;
      font-size: 1.06rem;
      line-height: 1.2;
    }
    .badge {
      flex: 0 0 auto;
      padding: 6px 9px;
      border-radius: 999px;
      background: linear-gradient(135deg, #fff1c9, #ffe3a1);
      color: #76510e;
      font-size: 0.75rem;
      font-weight: 900;
      white-space: nowrap;
    }
    .timeline {
      display: grid;
      gap: 0;
      margin: 0;
      padding: 0;
      list-style: none;
    }
    .stop {
      display: grid;
      grid-template-columns: 56px 1fr;
      gap: 8px;
      position: relative;
      padding: 0 0 12px;
    }
    .stop::before {
      content: "";
      position: absolute;
      left: 48px;
      top: 21px;
      bottom: -1px;
      width: 2px;
      background: linear-gradient(180deg, rgba(18, 141, 150, 0.25), rgba(242, 118, 91, 0.2));
    }
    .stop:last-child { padding-bottom: 0; }
    .stop:last-child::before { display: none; }
    .time {
      color: var(--aqua-dark);
      font-size: 0.72rem;
      font-weight: 900;
      letter-spacing: 0.02em;
    }
    .stop-body {
      min-width: 0;
      overflow-wrap: anywhere;
    }
    .stop-body::before {
      content: "";
      display: inline-block;
      width: 9px;
      height: 9px;
      margin: 0 7px 1px -13px;
      border: 2px solid var(--lagoon);
      border-radius: 50%;
      background: #fff;
      vertical-align: middle;
    }
    .stop-title { display: inline; font-weight: 850; }
    .stop-note {
      margin: 2px 0 0;
      color: var(--muted);
      font-size: 0.84rem;
    }
    .actions, .map-hub {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(132px, 1fr));
      gap: 8px;
      margin-top: 14px;
    }
    .map-btn, .primary-action, .ghost-action {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      padding: 12px 18px;
      border-radius: 20px;
      background: linear-gradient(135deg, var(--aqua), var(--aqua-dark));
      color: #fff;
      border: 0;
      font-size: 0.92rem;
      font-weight: 850;
      text-decoration: none;
      overflow-wrap: anywhere;
      box-shadow: 0 12px 24px rgba(27, 138, 148, 0.18);
      transition: transform 140ms ease, box-shadow 140ms ease, filter 140ms ease;
    }
    .ghost-action {
      background: #fff;
      color: var(--aqua-dark);
      border: 1px solid rgba(17, 101, 112, 0.18);
      box-shadow: 0 8px 18px rgba(23, 49, 59, 0.06);
    }
    .note {
      margin-top: 13px;
      padding: 11px 12px;
      border: 1px solid rgba(245, 182, 75, 0.42);
      border-radius: 18px;
      background: linear-gradient(135deg, #fff8e8, #fff0cc);
      color: #5f4b22;
      font-size: 0.91rem;
    }
    .note b {
      display: block;
      margin-bottom: 3px;
      color: #8a6418;
      font-size: 0.76rem;
    }

    .grid {
      display: grid;
      gap: 12px;
    }
    .card { padding: 14px; }
    .card h3 {
      margin: 0 0 9px;
      color: var(--aqua-dark);
      font-size: 1rem;
      line-height: 1.25;
      overflow-wrap: anywhere;
    }
    .card ul {
      display: grid;
      gap: 7px;
      margin: 0;
      padding: 0;
      list-style: none;
    }
    .card li {
      display: grid;
      grid-template-columns: 18px 1fr;
      gap: 7px;
      color: #35555f;
      font-size: 0.92rem;
      overflow-wrap: anywhere;
    }
    .card li::before {
      content: "";
      width: 10px;
      height: 10px;
      margin-top: 0.42em;
      border-radius: 50%;
      background: var(--sun);
    }
    .featured {
      border-color: rgba(242, 118, 91, 0.28);
      background: linear-gradient(135deg, var(--sand), #fffaf0);
    }

    .form {
      display: grid;
      gap: 9px;
      margin-bottom: 14px;
      padding: 14px;
      border-radius: 28px;
      background: rgba(255, 253, 248, 0.9);
      border: 1px solid rgba(27, 138, 148, 0.18);
    }
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    input, textarea, select {
      width: 100%;
      min-height: 42px;
      border: 1px solid rgba(17, 101, 112, 0.18);
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.94);
      color: var(--ink);
      padding: 9px 10px;
      outline-color: var(--aqua);
    }
    textarea {
      min-height: 92px;
      resize: vertical;
    }
    .post, .chat-message {
      padding: 13px;
      margin-bottom: 10px;
      overflow-wrap: anywhere;
    }
    .post-meta, .chat-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
      margin-bottom: 5px;
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 750;
    }
    .category {
      padding: 4px 7px;
      border-radius: 999px;
      background: #e7f4f3;
      color: var(--aqua-dark);
    }
    .post h3 {
      margin: 0 0 5px;
      font-size: 1rem;
    }
    .chat-phone {
      overflow: hidden;
      border: 1px solid rgba(11, 89, 103, 0.16);
      background: linear-gradient(180deg, #b9e4e7, #95d4d8);
      box-shadow: 0 18px 42px rgba(23, 49, 59, 0.14);
    }
    .chat-login {
      display: grid;
      gap: 10px;
      margin-bottom: 14px;
      padding: 16px;
      border: 1px solid rgba(27, 138, 148, 0.18);
      background:
        linear-gradient(135deg, rgba(255, 253, 248, 0.94), rgba(255, 242, 210, 0.92));
      box-shadow: 0 10px 24px rgba(23, 49, 59, 0.07);
    }
    .login-grid {
      display: grid;
      gap: 8px;
    }
    .login-grid.three {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }
    .chat-user {
      min-width: 0;
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 850;
      overflow-wrap: anywhere;
    }
    .chat-room-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      min-height: 48px;
      padding: 10px 13px;
      background: rgba(255, 250, 239, 0.95);
      border-bottom: 1px solid rgba(23, 49, 59, 0.09);
    }
    .chat-room-title {
      min-width: 0;
      font-weight: 900;
      overflow-wrap: anywhere;
    }
    .chat-count {
      flex: 0 0 auto;
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 800;
    }
    .chat-room-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }
    .leave-chat {
      min-height: 32px;
      padding: 6px 9px;
      border: 1px solid rgba(23, 49, 59, 0.12);
      border-radius: 999px;
      background: #fff;
      color: #36515a;
      font-size: 0.76rem;
      font-weight: 850;
      white-space: nowrap;
    }
    .chat-list {
      display: grid;
      align-content: end;
      gap: 10px;
      min-height: 420px;
      max-height: 62svh;
      overflow-y: auto;
      padding: 14px 12px 16px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.15), rgba(255, 255, 255, 0)),
        radial-gradient(circle at 10% 12%, rgba(255, 255, 255, 0.24), transparent 10rem),
        linear-gradient(180deg, #acdce0, #8fcfd3);
      scroll-behavior: smooth;
      overscroll-behavior: contain;
      -webkit-overflow-scrolling: touch;
    }
    .message-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      justify-items: start;
    }
    .message-row.mine { justify-items: end; }
    .message-author {
      margin: 0 0 3px 4px;
      color: rgba(23, 49, 59, 0.72);
      font-size: 0.75rem;
      font-weight: 850;
    }
    .message-row.mine .message-author { display: none; }
    .bubble-wrap {
      display: flex;
      align-items: flex-end;
      gap: 6px;
      max-width: min(76%, 520px);
    }
    .message-row.mine .bubble-wrap { flex-direction: row-reverse; }
    .bubble {
      min-width: 0;
      padding: 10px 12px;
      border-radius: 12px 18px 18px 18px;
      background: #fffdf8;
      color: #223c45;
      box-shadow: 0 4px 12px rgba(23, 49, 59, 0.08);

    function formatBytes(bytes) {
      if (!bytes) return "0 KB";
      const units = ["B", "KB", "MB", "GB"];
      const index = Math.min(units.length - 1, Math.floor(Math.log(bytes) / Math.log(1024)));
      const value = bytes / (1024 ** index);
      return `${value >= 10 || index === 0 ? Math.round(value) : value.toFixed(1)} ${units[index]}`;
    }

    function normalizeAnalysisText(text) {
      return String(text || "")
        .replace(/\r/g, "\n")
        .replace(/[ \t]+/g, " ")
        .replace(/\n{3,}/g, "\n\n")
        .trim();
    }

    function extractEnglishOcrText(text) {
      return String(text || "")
        .toLowerCase()
        .match(/[0-9a-z]+(?:'[0-9a-z]+)?/g)?.join(" ") || "";
    }

    function normalizeOcrStabilityText(text) {
      return extractEnglishOcrText(text).replace(/\s+/g, "");
    }

    function extractOcrTokens(text) {
      return String(text || "")
        .toLowerCase()
        .match(/[0-9a-z]+(?:'[0-9a-z]+)?/g) || [];
    }

    function isSimilarOcrText(previousText, nextText) {
      const previous = normalizeOcrStabilityText(previousText);
      const next = normalizeOcrStabilityText(nextText);
      if (!previous || !next) return false;
      if (previous === next) return true;
      if ((previous.includes(next) || next.includes(previous)) && Math.min(previous.length, next.length) >= 8) {
        return true;
      }

      const previousTokens = extractOcrTokens(previousText);
      const nextTokens = extractOcrTokens(nextText);
      if (!previousTokens.length || !nextTokens.length) return false;

      const previousSet = new Set(previousTokens);
      const nextSet = new Set(nextTokens);
      let shared = 0;
      for (const token of previousSet) {
        if (nextSet.has(token)) shared += 1;
      }

      const overlap = shared / Math.max(previousSet.size, nextSet.size);
      const previousLength = previousTokens.join("").length;
      const nextLength = nextTokens.join("").length;
      const lengthGap = Math.abs(previousLength - nextLength) / Math.max(previousLength, nextLength);
      return overlap >= 0.6 || (overlap >= 0.4 && lengthGap <= 0.35);
    }

    function detectTextScript(text) {
      const value = String(text || "");
      const latinCount = (value.match(/[A-Za-z]/g) || []).length;
      if (latinCount === 0) return "unknown";
      return "en";
    }

    async function createOcrWorker(onProgress) {
      const Tesseract = await loadTesseractModule();
      const worker = await Tesseract.createWorker("eng", 1, {
        logger: (message) => {
          if (!onProgress) return;
          if (message?.status) {
            onProgress({
              step: message.status,
              progress: typeof message.progress === "number" ? Math.round(message.progress * 100) : null
            });
          }
        }
      });

      await worker.setParameters({ preserve_interword_spaces: "1" });
      return worker;
    }

        await worker.terminate();
      }
    }

    async function translateWithGoogleTranslate(text, source, target) {
      const url = new URL("https://translate.googleapis.com/translate_a/single");
      url.searchParams.set("client", "gtx");
      url.searchParams.set("sl", source || "auto");
      url.searchParams.set("tl", target);
      url.searchParams.set("dt", "t");
      url.searchParams.set("q", text);

      const res = await fetch(url.toString(), {
        method: "GET"
      });
      if (!res.ok) {
        throw new Error("Google 번역이 응답하지 않았어요.");
      }
      const data = await res.json().catch(() => null);
      const translatedText = Array.isArray(data?.[0])
        ? data[0].map((part) => part?.[0] || "").join("")
        : "";
      return {
        translatedText,
        detectedLanguage: data?.[2] || "",
        confidence: null
      };
    }

    function readFileAsDataUrl(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = () => reject(reader.error || new Error("파일을 읽을 수 없어요."));
        reader.readAsDataURL(file);
      });
    }

    function loadImage(src) {
      return new Promise((resolve, reject) => {
        const image = new Image();
        image.onload = () => resolve(image);
        image.onerror = () => reject(new Error("이미지를 불러오지 못했어요."));
        image.src = src;
      });
    }

    async function compressImage(file, { maxSide = 3200, targetBytes = PHOTO_MAX_UPLOAD_BYTES } = {}) {
      const dataUrl = await readFileAsDataUrl(file);
      const image = await loadImage(dataUrl);
      const sourceWidth = image.naturalWidth || image.width;
      const sourceHeight = image.naturalHeight || image.height;
      const sourceLongestSide = Math.max(sourceWidth, sourceHeight);
      let nextMaxSide = sourceLongestSide ? Math.min(maxSide, sourceLongestSide) : maxSide;
      let quality = 0.92;
      let output = {
        dataUrl,
        width: sourceWidth,
        height: sourceHeight
      };

      for (let attempt = 0; attempt < 6; attempt += 1) {
        const scale = sourceLongestSide ? Math.min(1, nextMaxSide / sourceLongestSide) : 1;
        const canvas = document.createElement("canvas");
        canvas.width = Math.max(1, Math.round(sourceWidth * scale));
        canvas.height = Math.max(1, Math.round(sourceHeight * scale));
        const context = canvas.getContext("2d");
        context.drawImage(image, 0, 0, canvas.width, canvas.height);
        const blob = await new Promise((resolve) => canvas.toBlob(resolve, "image/jpeg", quality));
        if (!blob) break;
        output = {
          dataUrl: await new Promise((resolve) => {
            const reader = new FileReader();
            reader.onload = () => resolve(reader.result);
            reader.readAsDataURL(blob);
          }),
          width: canvas.width,
          height: canvas.height,
          blob,
          size: blob.size
        };
        if (blob.size <= targetBytes) {
          return output;
        }
        nextMaxSide = Math.max(1024, Math.round(nextMaxSide * 0.8));
        quality = Math.max(0.55, Number((quality - 0.1).toFixed(2)));
      }

      return output;
    }

    function normalizePhotoObject(object) {
      const metadata = object?.metadata || {};
      const createdAt = object?.created_at || object?.updated_at || new Date().toISOString();
      const path = `${PHOTO_FOLDER}/${object.name}`;
      const publicUrl = supabase.storage.from(PHOTO_BUCKET).getPublicUrl(path).data.publicUrl;
      return {

        path,
        publicUrl,
        size: Number(metadata.uploadSize || metadata.size || object.metadata?.uploadSize || object.metadata?.size || 0),
        width: metadata.width || 0,
        height: metadata.height || 0,
        mimeType: metadata.mimeType || object.metadata?.mimetype || "image/jpeg",
        createdAt
      };
    }

    function useSupabasePhotoGallery() {
      const [photos, setPhotos] = useState([]);
      const [status, setStatus] = useState("loading");
      const [error, setError] = useState("");

      async function loadPhotos({ silent = false } = {}) {
        if (!silent) setStatus("loading");
        setError("");
        const { data, error } = await supabase.storage
          .from(PHOTO_BUCKET)
          .list(PHOTO_FOLDER, { limit: 100, sortBy: { column: "created_at", order: "desc" } });

        if (error) {
          setStatus("error");
          setError(error.message);
          return [];
        }

        const next = (data || [])
          .filter((object) => object?.name)
          .map(normalizePhotoObject);
        setPhotos(next);
        setStatus("ready");
        return next;
      }

      useEffect(() => {
        let cancelled = false;

        const refresh = async (silent = false) => {
          if (cancelled) return;
          await loadPhotos({ silent });
        };

        refresh(false);
        const pollId = window.setInterval(() => refresh(true), 20000);
        const onVisibility = () => {
          if (!document.hidden) refresh(true);
        };
        document.addEventListener("visibilitychange", onVisibility);

        return () => {
          cancelled = true;
          window.clearInterval(pollId);
          document.removeEventListener("visibilitychange", onVisibility);
        };
      }, []);

      async function addFiles(fileList) {
        const files = Array.from(fileList || []).filter((file) => file.type.startsWith("image/"));
        if (files.length === 0) return [];
        setError("");
        const uploaded = [];

        for (const file of files) {
          const compressed = await compressImage(file);
          const uploadBlob = compressed.blob || await (await fetch(compressed.dataUrl)).blob();
          if (uploadBlob.size > PHOTO_MAX_UPLOAD_BYTES) {
            setError("50MB 이하로 압축하지 못했어요. 사진을 더 작게 잘라서 다시 올려주세요.");
            continue;
          }
          const stamp = `${Date.now()}-${crypto.randomUUID()}`;
          const path = `${PHOTO_FOLDER}/${stamp}.jpg`;
          const { error: uploadError } = await supabase.storage.from(PHOTO_BUCKET).upload(path, uploadBlob, {
            cacheControl: "3600",
            contentType: "image/jpeg",
            upsert: false,
            metadata: {
              originalName: file.name,
              originalSize: String(file.size),
              uploadSize: String(uploadBlob.size),
              width: String(compressed.width),
              height: String(compressed.height),
              mimeType: "image/jpeg",
            }
          });

          if (uploadError) {
            setError(uploadError.message);
            continue;
          }

          uploaded.push({
            id: path,
            name: file.name.replace(/\.[^.]+$/, "") || "사진",
            path,
            publicUrl: supabase.storage.from(PHOTO_BUCKET).getPublicUrl(path).data.publicUrl,
            size: uploadBlob.size,
            width: compressed.width,
            height: compressed.height,
            mimeType: "image/jpeg",
            createdAt: new Date().toISOString()
          });
        }

        if (uploaded.length > 0) {
          await loadPhotos({ silent: true });
        }
        return uploaded;
      }

      async function removePhoto(photo) {
        if (!photo?.path) return false;
        setError("");
        const { error: removeError } = await supabase.storage.from(PHOTO_BUCKET).remove([photo.path]);
        if (removeError) {
          setError(removeError.message);
          return false;
        }
        setPhotos((current) => current.filter((item) => item.path !== photo.path));
        return true;
      }

      async function clearPhotos() {
        if (!photos.length) return true;
        setError("");
        const { error: removeError } = await supabase.storage.from(PHOTO_BUCKET).remove(photos.map((photo) => photo.path));
        if (removeError) {
          setError(removeError.message);
          return false;
        }
        setPhotos([]);
        return true;
      }

      return { photos, status, addFiles, removePhoto, clearPhotos, error, reload: loadPhotos };
    }

    function useSupabaseRows(table, normalizeRow, sortRows, pollMs = 4000) {
      const [items, setItems] = useState([]);
      const [status, setStatus] = useState("loading");
      const [error, setError] = useState("");
      const channelRef = useRef(null);

      useEffect(() => {
        let cancelled = false;

        async function loadRows(showLoading = false) {
          if (showLoading) setStatus("loading");
          setError("");
          const { data, error } = await supabase
            .from(table)
            .select("*")
            .order("created_at", { ascending: sortRows === byOldest });

          if (cancelled) return;
          if (error) {
            setError(error.message);
            setStatus("error");
            return;
          }
          setItems((data || []).map(normalizeRow).sort(sortRows));
          setStatus("ready");
        }

        loadRows(true);
        const pollId = window.setInterval(() => loadRows(false), pollMs);
        const syncLocalRow = (row) => {
          if (!row) return;
          setItems((current) => upsertRealtimeRow(current, normalizeRow(row), sortRows));
        };

        const onStorage = (event) => {
          if (event.key !== CHAT_SYNC_KEY) return;
          const payload = safeJson(event.newValue);
          if (!payload || payload.table !== table) return;
          syncLocalRow(payload.row);
        };
        const onBroadcast = (event) => {
          const payload = event.data;
          if (!payload || payload.table !== table) return;
          syncLocalRow(payload.row);
        };

        window.addEventListener("storage", onStorage);
        chatBroadcast?.addEventListener("message", onBroadcast);

        const channel = supabase
          .channel(`${table}-realtime`, { config: { broadcast: { self: false } } })
          .on("broadcast", { event: "row-change" }, ({ payload }) => {
            if (!payload || payload.table !== table || !payload.row) return;
            setItems((current) => upsertRealtimeRow(current, normalizeRow(payload.row), sortRows));
          })
          .on("postgres_changes", { event: "*", schema: "public", table }, (payload) => {
            setItems((current) => {
              if (payload.eventType === "DELETE") {
                return current.filter((item) => item.id !== payload.old.id);
              }
              return upsertRealtimeRow(current, normalizeRow(payload.new), sortRows);
            });
          })
          .subscribe((state) => {
            if (state === "CHANNEL_ERROR") {
              setError("실시간 연결을 확인해주세요.");
            }
          });
        channelRef.current = channel;

        return () => {
          cancelled = true;
          window.clearInterval(pollId);
          window.removeEventListener("storage", onStorage);
          chatBroadcast?.removeEventListener("message", onBroadcast);
          channelRef.current = null;
          supabase.removeChannel(channel);
        };
      }, [table, normalizeRow, sortRows, pollMs]);

      async function insertRow(row) {
        setError("");
        const { data, error } = await supabase.from(table).insert(row).select("*").single();
        if (error) {
          setError(error.message);
          return false;
        }
        const savedRow = data || row;
        setItems((current) => upsertRealtimeRow(current, normalizeRow(savedRow), sortRows));
        const localPayload = { table, row: savedRow, sentAt: Date.now() };
        chatBroadcast?.postMessage(localPayload);
        localStorage.setItem(CHAT_SYNC_KEY, JSON.stringify(localPayload));
        channelRef.current?.send({
          type: "broadcast",
          event: "row-change",
          payload: { table, row: savedRow }
        });
        return true;
      }

      return { items, status, error, insertRow };
    }

        event.preventDefault();
        const userId = login.userId.trim();
        const password = login.password.trim();
        const displayName = login.displayName.trim();
        if (!userId || !password || !displayName) return;
        const nextSession = {
          userId,
          displayName,
          signedInAt: new Date().toISOString()
        };
        sessionStorage.setItem(CHAT_SESSION_KEY, JSON.stringify(nextSession));
        setSession(nextSession);
        setLogin({ userId: "", password: "", displayName: "" });
      };

      const leaveChat = () => {
        sessionStorage.removeItem(CHAT_SESSION_KEY);
        setSession(null);
        setContent("");
      };

      const submit = async (event) => {
        event.preventDefault();
        if (!session || !content.trim()) return;
        const ok = await insertRow({
          id: crypto.randomUUID(),
          author: session.displayName,
          message: content.trim(),
          created_at: new Date().toISOString()
        });
        if (ok) setContent("");
      };

      if (!session) {
        return React.createElement("section", null,
          React.createElement("h2", { className: "section-title" }, "가족 채팅"),
          React.createElement("p", { className: "section-kicker" }, "아이디, 비밀번호, 이름을 입력해 채팅방에 들어갑니다. 이름은 나가기 전까지 유지됩니다."),
          React.createElement("form", { className: "chat-login", onSubmit: enterChat },
            React.createElement("div", { className: "login-grid three" },
              React.createElement("input", { placeholder: "아이디", autoComplete: "username", value: login.userId, onChange: (e) => setLogin({ ...login, userId: e.target.value }) }),
              React.createElement("input", { placeholder: "비밀번호", type: "password", autoComplete: "current-password", value: login.password, onChange: (e) => setLogin({ ...login, password: e.target.value }) }),
              React.createElement("input", { placeholder: "채팅 이름", value: login.displayName, onChange: (e) => setLogin({ ...login, displayName: e.target.value }) })
            ),
            React.createElement("button", { className: "primary-action", type: "submit" }, "채팅방 입장")
          )
        );
      }

      return React.createElement("section", null,
        React.createElement("h2", { className: "section-title" }, "가족 채팅"),
        React.createElement("p", { className: "section-kicker" }, "여행 중 빠른 공유용입니다. 새 메시지는 Supabase Realtime으로 바로 동기화됩니다."),
        error ? React.createElement("div", { className: "empty" }, `Supabase 오류: ${error}`) : null,
        React.createElement("div", { className: "chat-phone" },
          React.createElement("div", { className: "chat-room-head" },
            React.createElement("div", { className: "chat-room-title" }, "하와이 가족방"),
            React.createElement("div", { className: "chat-room-actions" },
              React.createElement("div", { className: "chat-user" }, session.displayName),
              React.createElement("div", { className: "chat-count" }, `${messages.length} messages`),
              React.createElement("button", { className: "leave-chat", type: "button", onClick: leaveChat }, "나가기")
            )
          ),
          React.createElement("div", { className: "chat-list", ref: chatListRef },
            status === "loading" ? React.createElement("div", { className: "empty" }, "메시지를 불러오는 중입니다.") :
            messages.length === 0 ? React.createElement("div", { className: "empty" }, "아직 메시지가 없습니다.") :
            messages.map((message) => {
              const mine = message.author === activeAuthor;
              return React.createElement("div", { className: `message-row ${mine ? "mine" : ""}`, key: message.id },
                React.createElement("div", { className: "message-author" }, message.author),
                React.createElement("div", { className: "bubble-wrap" },
                  React.createElement("div", { className: "bubble" }, message.content),
                  React.createElement("div", { className: "message-time" }, new Date(message.createdAt).toLocaleTimeString("ko-KR", { hour: "2-digit", minute: "2-digit" }))
                )
              );
            })
          ),
          React.createElement("form", { className: "chat-compose", onSubmit: submit },
            React.createElement("input", { value: session.displayName, readOnly: true, "aria-label": "채팅 이름" }),
            React.createElement("textarea", { placeholder: "메시지", value: content, onChange: (e) => setContent(e.target.value) }),
            React.createElement("button", { className: "primary-action chat-send", type: "submit" }, "전송")
          )
        )
      );
    }

    function Maps() {
      return React.createElement("section", null,
        React.createElement("h2", { className: "section-title" }, "지도 바로가기"),
        React.createElement("p", { className: "section-kicker" }, "현장에서 많이 열 곳만 모았습니다. 버튼을 누르면 Google Maps 검색으로 연결됩니다."),
        React.createElement("div", { className: "map-hub" },
          mapLinks.map(([label, query]) => React.createElement("a", { className: "map-btn", href: mapUrl(query), target: "_blank", rel: "noopener", key: query }, label))
        )
      );
    }

    function Notes() {
      return React.createElement("section", null,
        React.createElement("h2", { className: "section-title" }, "메모"),
        React.createElement("div", { className: "card" }, "일정은 컨디션에 따라 줄이는 방향을 기본으로 합니다. 긴 이동일에는 아침 출발 전 물, 간식, 화장실 위치, 대체 식당을 먼저 확인합니다."),
        React.createElement("section", { className: "panel" },
          React.createElement("h2", null, "체크포인트"),
          React.createElement("ul", null,
            React.createElement("li", null, "야외 활동은 오전 중심, 한낮에는 실내나 호텔 휴식으로 둡니다."),
            React.createElement("li", null, "긴 하이킹, 거친 보트, zipline, horseback riding, UTV, 무리한 snorkeling은 일정에서 빼고 여유 시간을 둡니다."),
            React.createElement("li", null, "그늘, 화장실, 물, 주차가 쉬운 장소를 우선하고 일정 변경 여지를 남깁니다.")
          )
        )
      );
    }

    function App() {
      const [active, setActive] = useState("schedule");
      const [swipeDirection, setSwipeDirection] = useState("forward");
      const [swipeOffset, setSwipeOffset] = useState(0);
      const [isDragging, setIsDragging] = useState(false);
      const [showSplash, setShowSplash] = useState(() => !readSessionFlag(SPLASH_SEEN_KEY));
      const touchStartRef = useRef(null);
      const activeIndex = tabIds.indexOf(active);
      const splashTimerRef = useRef(null);

      const selectTab = (nextId) => {
        const nextIndex = tabIds.indexOf(nextId);
        if (nextIndex === -1 || nextIndex === activeIndex) return;
        setSwipeDirection(nextIndex > activeIndex ? "forward" : "backward");
        setActive(nextId);
        setSwipeOffset(0);
        setIsDragging(false);
        touchStartRef.current = null;
      };

      const finishSplash = () => {
        if (!showSplash) return;
        writeSessionFlag(SPLASH_SEEN_KEY);
        setShowSplash(false);
      };

      const handleTouchStart = (event) => {
        const touch = event.touches?.[0];
        if (!touch) return;
        touchStartRef.current = {
          x: touch.clientX,
          y: touch.clientY,
          startedAt: Date.now(),
          locked: false
        };
        setIsDragging(false);
        setSwipeOffset(0);
      };

      const handleTouchMove = (event) => {
        const start = touchStartRef.current;
        const touch = event.touches?.[0];
        if (!start || !touch) return;
        const dx = touch.clientX - start.x;
        const dy = touch.clientY - start.y;
        if (!start.locked) {
          if (Math.abs(dx) < 12 && Math.abs(dy) < 12) return;
          start.locked = Math.abs(dx) > Math.abs(dy) * 1.15;
        }
        if (!start.locked) return;
        if (event.cancelable) event.preventDefault();
        setIsDragging(true);
        const nextOffset = Math.max(-72, Math.min(72, dx * 0.28));
        setSwipeOffset(nextOffset);
      };

      const handleTouchEnd = (event) => {
        const start = touchStartRef.current;
        const touch = event.changedTouches?.[0];
        touchStartRef.current = null;
        if (!start || !touch) {
          setIsDragging(false);
          setSwipeOffset(0);
          return;
        }
        const dx = touch.clientX - start.x;
        const dy = touch.clientY - start.y;
        const dt = Date.now() - start.startedAt;
        const committed = start.locked && dt <= 1000 && Math.abs(dx) > 48 && Math.abs(dx) > Math.abs(dy) * 1.15;
        if (committed) {
          const nextIndex = dx < 0 ? activeIndex + 1 : activeIndex - 1;
          if (nextIndex >= 0 && nextIndex < tabIds.length) {
            setSwipeDirection(dx < 0 ? "forward" : "backward");
            setActive(tabIds[nextIndex]);
          }
        }
        setIsDragging(false);
        setSwipeOffset(0);
      };

      useEffect(() => {
        if (!showSplash) return;
        if (splashTimerRef.current) window.clearTimeout(splashTimerRef.current);
        splashTimerRef.current = window.setTimeout(() => {
          writeSessionFlag(SPLASH_SEEN_KEY);
          setShowSplash(false);
        }, 1450);
        return () => {
          if (splashTimerRef.current) window.clearTimeout(splashTimerRef.current);
        };
      }, [showSplash]);

      const view = {
        schedule: React.createElement(Schedule),
        photos: React.createElement(Photos, { showGallery: true, showPhotoAnalysis: false, showLiveTranslator: false }),
        ai: React.createElement(Photos, { showGallery: false, showPhotoAnalysis: true, showLiveTranslator: true }),
        supplies: React.createElement(Supplies),
        board: React.createElement(Board),
        chat: React.createElement(Chat),
        maps: React.createElement(Maps),
        notes: React.createElement(Notes),
      }[active];
      return React.createElement(React.Fragment, null,
        showSplash ? React.createElement("div", { className: "splash", role: "presentation", onClick: finishSplash },
          React.createElement("div", { className: "splash-card", role: "dialog", "aria-label": "앱 시작 화면" },
            React.createElement("div", { className: "splash-mark", "aria-hidden": "true" }),
            React.createElement("p", { className: "splash-kicker" }, "Aloha · Hong's Trip"),
            React.createElement("h2", null, "Hong's 햅삐한 하와이여행"),
            React.createElement("p", null, "조금 더 심플하게, 조금 더 현대적으로. 스와이프와 사진, AI 번역을 위한 시작 화면입니다."),
            React.createElement("div", { className: "splash-bar", "aria-hidden": "true" })
          )
        ) : null,
        React.createElement("main", { className: "shell" },
          React.createElement(Header),
          React.createElement(Tabbar, { active, setActive: selectTab }),
          React.createElement("div", {
            className: "view-shell",
            onTouchStart: handleTouchStart,
            onTouchMove: handleTouchMove,
            onTouchEnd: handleTouchEnd,
            onTouchCancel: handleTouchEnd
          },
            React.createElement("div", {
              className: `view-panel ${isDragging ? "is-dragging" : ""} ${swipeDirection === "forward" ? "swipe-forward" : "swipe-backward"}`,
              key: active,
              style: {
                "--swipe-offset": `${swipeOffset}px`,
                "--swipe-scale": isDragging ? "0.994" : "1"
              }
            }, view)
          ),
          React.createElement("footer", null, "React static app · board/chat synced with Supabase Realtime")
        )
      );
    }

    createRoot(document.getElementById("root")).render(React.createElement(App));
  </script>
</body>
</html>
