<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Hawaii Family Trip App</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #17313b;
      --muted: #62747b;
      --line: #d9e7e8;
      --paper: #fffdf8;
      --wash: #eef8f7;
      --aqua: #1b8a94;
      --aqua-dark: #116570;
      --coral: #e86f51;
      --sun: #f5b64b;
      --sand: #fff5df;
      --shadow: 0 16px 34px rgba(23, 49, 59, 0.12);
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 10% 0%, rgba(245, 182, 75, 0.22), transparent 27rem),
        linear-gradient(180deg, #e9f7f5 0%, #fffaf0 42%, #f7fbf8 100%);
      color: var(--ink);
      line-height: 1.5;
    }
    button, input, textarea, select { font: inherit; }
    button { cursor: pointer; }
    a { color: inherit; }

    .shell {
      width: min(100%, 920px);
      margin: 0 auto;
      padding: 16px 14px 44px;
    }
    .hero {
      min-height: 58svh;
      display: grid;
      align-content: end;
      padding: 18px 2px 18px;
    }
    .hero-visual {
      min-height: 24svh;
      overflow: hidden;
      border-radius: 8px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.08), rgba(23, 49, 59, 0.2)),
        linear-gradient(135deg, #8ed8d4 0%, #f7d18b 45%, #ef876e 100%);
      box-shadow: var(--shadow);
      position: relative;
    }
    .hero-visual::before,
    .hero-visual::after {
      content: "";
      position: absolute;
      inset: auto auto 0 0;
      width: 120%;
      height: 35%;
      background: rgba(255, 253, 248, 0.82);
      clip-path: polygon(0 54%, 10% 45%, 22% 62%, 36% 49%, 50% 67%, 65% 47%, 82% 61%, 100% 42%, 100% 100%, 0 100%);
    }
    .hero-visual::after {
      height: 24%;
      background: rgba(27, 138, 148, 0.34);
      clip-path: polygon(0 42%, 13% 50%, 28% 36%, 43% 52%, 58% 39%, 76% 55%, 100% 38%, 100% 100%, 0 100%);
    }
    .eyebrow {
      margin: 18px 0 8px;
      color: var(--aqua-dark);
      font-size: 0.78rem;
      font-weight: 900;
      letter-spacing: 0;
      text-transform: uppercase;
    }
    h1 {
      margin: 0;
      max-width: 12ch;
      font-size: clamp(2.45rem, 12vw, 5.8rem);
      line-height: 0.96;
      letter-spacing: 0;
    }
    .subtitle {
      margin: 12px 0 0;
      color: var(--muted);
      font-size: 0.98rem;
      overflow-wrap: anywhere;
    }
    .quick-facts {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 9px;
      margin-top: 14px;
    }
    .fact {
      min-height: 64px;
      padding: 10px;
      border: 1px solid rgba(27, 138, 148, 0.18);
      border-radius: 8px;
      background: rgba(255, 253, 248, 0.84);
      overflow-wrap: anywhere;
    }
    .fact b {
      display: block;
      margin-bottom: 3px;
      color: var(--aqua-dark);
      font-size: 0.74rem;
      font-weight: 900;
    }
    .fact span { font-size: 0.9rem; font-weight: 800; }

    .tabbar {
      position: sticky;
      top: 0;
      z-index: 5;
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 7px;
      margin: 0 -14px 14px;
      padding: 10px 14px 11px;
      background: rgba(246, 251, 248, 0.96);
      border-block: 1px solid rgba(27, 138, 148, 0.14);
      backdrop-filter: blur(12px);
    }
    .tab {
      min-height: 42px;
      padding: 8px 7px;
      border: 1px solid rgba(17, 101, 112, 0.22);
      border-radius: 8px;
      background: rgba(255, 253, 248, 0.96);
      color: var(--aqua-dark);
      font-size: 0.8rem;
      font-weight: 900;
      line-height: 1.1;
      text-align: center;
      overflow-wrap: anywhere;
    }
    .tab.active {
      border-color: var(--aqua);
      background: var(--aqua);
      color: #fff;
      box-shadow: 0 7px 16px rgba(27, 138, 148, 0.2);
    }
    .section-title {
      margin: 10px 2px 12px;
      font-size: 1.28rem;
      letter-spacing: 0;
    }
    .section-kicker {
      margin: -5px 2px 14px;
      color: var(--muted);
      font-size: 0.94rem;
      overflow-wrap: anywhere;
    }

    .toolbar {
      display: flex;
      gap: 7px;
      overflow-x: auto;
      scroll-snap-type: x proximity;
      margin: 0 -14px 18px;
      padding: 9px 14px 11px;
      background: rgba(246, 251, 248, 0.94);
      border-block: 1px solid rgba(27, 138, 148, 0.12);
      scrollbar-width: none;
    }
    .toolbar::-webkit-scrollbar { display: none; }
    .chip {
      flex: 0 0 auto;
      min-height: 38px;
      padding: 8px 13px;
      border: 1px solid rgba(17, 101, 112, 0.2);
      border-radius: 999px;
      background: #fff;
      color: var(--aqua-dark);
      font-size: 0.86rem;
      font-weight: 850;
      white-space: nowrap;
    }
    .chip.active {
      background: var(--aqua-dark);
      color: #fff;
      border-color: var(--aqua-dark);
    }

    .card, .day-card, .panel, .post, .chat-message {
      border-radius: 8px;
      background: rgba(255, 253, 248, 0.96);
      border: 1px solid var(--line);
      box-shadow: 0 10px 24px rgba(23, 49, 59, 0.07);
    }
    .day-card { margin-bottom: 16px; padding: 15px; }
    .day-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 13px;
    }
    .date {
      margin: 0 0 2px;
      color: var(--coral);
      font-size: 0.82rem;
      font-weight: 900;
    }
    .day-card h3 {
      margin: 0;
      font-size: 1.18rem;
      line-height: 1.2;
    }
    .badge {
      flex: 0 0 auto;
      padding: 6px 9px;
      border-radius: 999px;
      background: #fff3d6;
      color: #805511;
      font-size: 0.75rem;
      font-weight: 900;
      white-space: nowrap;
    }
    .timeline {
      display: grid;
      gap: 0;
      margin: 0;
      padding: 0;
      list-style: none;
    }
    .stop {
      display: grid;
      grid-template-columns: 62px 1fr;
      gap: 10px;
      position: relative;
      padding: 0 0 14px;
    }
    .stop::before {
      content: "";
      position: absolute;
      left: 54px;
      top: 23px;
      bottom: -1px;
      width: 2px;
      background: var(--line);
    }
    .stop:last-child { padding-bottom: 0; }
    .stop:last-child::before { display: none; }
    .time {
      color: var(--aqua-dark);
      font-size: 0.76rem;
      font-weight: 900;
    }
    .stop-body {
      min-width: 0;
      overflow-wrap: anywhere;
    }
    .stop-body::before {
      content: "";
      display: inline-block;
      width: 10px;
      height: 10px;
      margin: 0 8px 1px -15px;
      border: 3px solid var(--aqua);
      border-radius: 50%;
      background: #fff;
      vertical-align: middle;
    }
    .stop-title { display: inline; font-weight: 850; }
    .stop-note {
      margin: 3px 0 0;
      color: var(--muted);
      font-size: 0.9rem;
    }
    .actions, .map-hub {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 13px;
    }
    .map-btn, .primary-action, .ghost-action {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 40px;
      padding: 9px 12px;
      border-radius: 8px;
      background: var(--aqua);
      color: #fff;
      border: 0;
      font-size: 0.86rem;
      font-weight: 850;
      text-decoration: none;
      overflow-wrap: anywhere;
    }
    .ghost-action {
      background: #fff;
      color: var(--aqua-dark);
      border: 1px solid rgba(17, 101, 112, 0.22);
    }
    .note {
      margin-top: 13px;
      padding: 11px 12px;
      border: 1px solid rgba(245, 182, 75, 0.42);
      border-radius: 8px;
      background: #fff9ea;
      color: #5f4b22;
      font-size: 0.91rem;
    }
    .note b {
      display: block;
      margin-bottom: 3px;
      color: #8a6418;
      font-size: 0.76rem;
    }

    .grid {
      display: grid;
      gap: 12px;
    }
    .card { padding: 14px; }
    .card h3 {
      margin: 0 0 9px;
      color: var(--aqua-dark);
      font-size: 1rem;
      line-height: 1.25;
      overflow-wrap: anywhere;
    }
    .card ul {
      display: grid;
      gap: 7px;
      margin: 0;
      padding: 0;
      list-style: none;
    }
    .card li {
      display: grid;
      grid-template-columns: 18px 1fr;
      gap: 7px;
      color: #35555f;
      font-size: 0.92rem;
      overflow-wrap: anywhere;
    }
    .card li::before {
      content: "";
      width: 10px;
      height: 10px;
      margin-top: 0.42em;
      border-radius: 50%;
      background: var(--sun);
    }
    .featured {
      border-color: rgba(245, 182, 75, 0.5);
      background: var(--sand);
    }

    .form {
      display: grid;
      gap: 9px;
      margin-bottom: 14px;
      padding: 14px;
      border-radius: 8px;
      background: rgba(255, 253, 248, 0.96);
      border: 1px solid rgba(27, 138, 148, 0.18);
    }
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    input, textarea, select {
      width: 100%;
      min-height: 42px;
      border: 1px solid rgba(17, 101, 112, 0.22);
      border-radius: 8px;
      background: #fff;
      color: var(--ink);
      padding: 9px 10px;
      outline-color: var(--aqua);
    }
    textarea {
      min-height: 92px;
      resize: vertical;
    }
    .post, .chat-message {
      padding: 13px;
      margin-bottom: 10px;
      overflow-wrap: anywhere;
    }
    .post-meta, .chat-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
      margin-bottom: 5px;
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 750;
    }
    .category {
      padding: 4px 7px;
      border-radius: 999px;
      background: #e7f4f3;
      color: var(--aqua-dark);
    }
    .post h3 {
      margin: 0 0 5px;
      font-size: 1rem;
    }
    .empty {
      margin: 10px 0;
      padding: 14px;
      border: 1px dashed rgba(17, 101, 112, 0.3);
      border-radius: 8px;
      color: var(--muted);
      background: rgba(255, 253, 248, 0.72);
    }
    .panel {
      margin-top: 16px;
      padding: 16px;
      background: #17313b;
      color: #f8fbfa;
    }
    .panel h2 { margin: 0 0 10px; font-size: 1.12rem; }
    .panel ul { margin: 0; padding-left: 19px; }
    .panel li + li { margin-top: 7px; }
    footer {
      padding: 24px 4px 6px;
      color: var(--muted);
      font-size: 0.84rem;
      text-align: center;
    }
    @media (min-width: 720px) {
      .shell { padding-inline: 24px; }
      .hero {
        min-height: 72vh;
        grid-template-columns: 0.9fr 1.1fr;
        align-items: end;
        gap: 34px;
      }
      .hero-visual { min-height: 500px; }
      .quick-facts { grid-template-columns: repeat(4, minmax(0, 1fr)); }
      .tabbar, .toolbar { margin-inline: -24px; padding-inline: 24px; }
      .grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module">
    import React, { useMemo, useState } from "https://esm.sh/react@18.3.1";
    import { createRoot } from "https://esm.sh/react-dom@18.3.1/client";

    const tabs = [
      ["schedule", "일정"],
      ["supplies", "준비물"],
      ["board", "게시판"],
      ["chat", "채팅"],
      ["maps", "지도"],
      ["notes", "메모"],
    ];

    const days = [
      {
        id: "0624", date: "6/24 Wed", title: "Arrival / Adjust", badge: "낮은 강도",
        stops: [["10:30", "HNL 도착, 입국, 호텔 이동", "수하물 드롭 또는 체크인 후 바로 쉬는 흐름."], ["점심", "가벼운 식사", "도착일은 양과 이동을 줄이는 쪽으로."], ["오후", "체크인, 낮잠, 와이키키 짧은 산책", "첫날 쇼핑은 길게 잡지 않기."], ["저녁", "Duke's Waikiki 또는 Marugame Udon", "대기 시간이 길면 바로 대체 가능한 곳으로 이동."]],
        maps: [["공항 지도", "Daniel K. Inouye International Airport"], ["와이키키 지도", "Waikiki Beach"]],
        memoTitle: "임산부 메모", memo: "비행 직후에는 걷는 양을 짧게 유지하고, 도착일에는 회복을 우선합니다."
      },
      {
        id: "0625", date: "6/25 Thu", title: "Waikiki + Shopping", badge: "실내 휴식",
        stops: [["아침", "Kapiolani Park, Waikiki Beach 산책", "예쁜 근처 장소 중심으로 천천히."], ["점심", "Pioneer Saloon", "포장 후 그늘이나 호텔에서 먹는 옵션도 좋음."], ["오후", "Ala Moana Center, 호텔 휴식", "가장 더운 시간은 실내와 호텔로 배치."], ["저녁", "Monkeypod Kitchen", "예약 가능하면 저녁 피로도를 줄일 수 있음."]],
        maps: [["공원 지도", "Kapiolani Park Honolulu"], ["알라모아나 지도", "Ala Moana Center"]],
        memoTitle: "가족 메모", memo: "쇼핑은 쉬는 의자가 많은 구역 위주로 움직이고, 더운 시간 야외 이동을 줄입니다."
      },
      {
        id: "0626", date: "6/26 Fri", title: "East Coast Drive", badge: "풍경 드라이브",
        stops: [["오전", "Halona Blowhole, Makapuu Lookout", "사진과 전망 위주, 긴 하이킹은 생략."], ["점심", "Kailua lunch", "화장실과 주차가 쉬운 곳 우선."], ["오후", "Lanikai / Kailua 짧은 방문", "물놀이는 짧고 가볍게, 대부분은 사진과 휴식."], ["저녁", "ZIGU 또는 Hula Grill Waikiki", "와이키키 복귀 후 이동 적은 저녁."]],

        maps: [["진주만 지도", "Pearl Harbor National Memorial"], ["Nico's 지도", "Nico's Pier 38"]],

    const supplies = [
      ["서류 / 결제", ["여권, ESTA, 항공권, 숙소/렌터카 바우처", "여행자보험, 운전자는 한국면허증 + 국제운전면허증", "해외결제 카드 2장 이상, 팁용 1달러 지폐"]],

      ["공용", ["가족 상비약, 밴드, 체온계, 소독티슈", "보냉백, 텀블러, 지퍼백, 접이식 장바구니", "세탁망, 작은 세제, 휴대용 티슈, 물티슈"]],
      ["해변용품", ["수영복, 래시가드, 아쿠아슈즈, 큰 타월", "SPF 선크림, 모자, 선글라스, 휴대용 티슈", "방수팩, 젖은 옷용 비닐백, 여벌 옷"]],

    const mapLinks = [
      ["Waikiki Beach", "Waikiki Beach"],
      ["Ala Moana Center", "Ala Moana Center"],
      ["Pearl Harbor", "Pearl Harbor National Memorial"],
      ["Dole Plantation", "Dole Plantation"],
      ["HNL Airport", "Daniel K. Inouye International Airport"],
    ];

    const boardSeed = [
      { id: "seed-board-1", author: "PM", category: "공지", title: "게시판 사용 시작", content: "여행 준비 질문, 맛집 의견, 일정 변경 요청을 여기에 남기면 됩니다.", createdAt: new Date().toISOString() }
    ];
    const chatSeed = [
      { id: "seed-chat-1", author: "PM", content: "여행 중 빠른 공유용 채팅 탭입니다. 지금은 이 브라우저에 저장됩니다.", createdAt: new Date().toISOString() }
    ];

    function mapUrl(query) {
      return `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(query)}`;
    }

    function useStoredList(key, seed) {
      const [items, setItems] = useState(() => {
        try {
          const stored = localStorage.getItem(key);
          return stored ? JSON.parse(stored) : seed;
        } catch {
          return seed;
        }
      });
      const save = (next) => {
        setItems(next);
        localStorage.setItem(key, JSON.stringify(next));
      };
      return [items, save];
    }

    function Header() {
      return (
        React.createElement("section", { className: "hero" },
          React.createElement("div", { className: "hero-visual", "aria-hidden": "true" }),
          React.createElement("div", null,
            React.createElement("p", { className: "eyebrow" }, "Honolulu / Oahu only"),
            React.createElement("h1", null, "Hawaii Family Trip"),
            React.createElement("p", { className: "subtitle" }, "2026년 6월 24일부터 29일까지, 와이키키를 기준으로 무리 없는 가족 여행 리듬에 맞춘 React 여행 앱입니다."),
            React.createElement("div", { className: "quick-facts" },
              React.createElement("div", { className: "fact" }, React.createElement("b", null, "기간"), React.createElement("span", null, "6/24 Wed - 6/29 Mon")),
              React.createElement("div", { className: "fact" }, React.createElement("b", null, "그룹"), React.createElement("span", null, "6명, 임산부 동행")),
              React.createElement("div", { className: "fact" }, React.createElement("b", null, "기능"), React.createElement("span", null, "일정, 준비물, 게시판, 채팅")),
              React.createElement("div", { className: "fact" }, React.createElement("b", null, "저장"), React.createElement("span", null, "브라우저 localStorage"))
            )
          )
        )
      );
    }

    function Tabbar({ active, setActive }) {
      return React.createElement("nav", { className: "tabbar", "aria-label": "주요 탭" },
        tabs.map(([id, label]) => React.createElement("button", {
          key: id,
          className: `tab ${active === id ? "active" : ""}`,
          onClick: () => setActive(id)
        }, label))
      );
    }

    function Schedule() {
      const [activeDay, setActiveDay] = useState(days[0].id);
      const shownDays = useMemo(() => days.filter((day) => day.id === activeDay), [activeDay]);
      return React.createElement("section", null,
        React.createElement("h2", { className: "section-title" }, "여행 일정"),
        React.createElement("nav", { className: "toolbar", "aria-label": "날짜 바로가기" },
          days.map((day) => React.createElement("button", {
            key: day.id,
            className: `chip ${activeDay === day.id ? "active" : ""}`,
            onClick: () => setActiveDay(day.id)
          }, `${day.date.split(" ")[0]} ${day.title.split(" ")[0]}`))
        ),
        shownDays.map((day) => React.createElement("article", { className: "day-card", key: day.id },
          React.createElement("div", { className: "day-head" },
            React.createElement("div", null,
              React.createElement("p", { className: "date" }, day.date),
              React.createElement("h3", null, day.title)
            ),
            React.createElement("span", { className: "badge" }, day.badge)
          ),
          React.createElement("ol", { className: "timeline" },
            day.stops.map(([time, title, note]) => React.createElement("li", { className: "stop", key: `${day.id}-${time}-${title}` },
              React.createElement("span", { className: "time" }, time),
              React.createElement("div", { className: "stop-body" },
                React.createElement("span", { className: "stop-title" }, title),
                React.createElement("p", { className: "stop-note" }, note)
              )
            ))
          ),
          React.createElement("div", { className: "actions" },
            day.maps.map(([label, query]) => React.createElement("a", { className: "map-btn", href: mapUrl(query), target: "_blank", rel: "noopener", key: query }, label))
          ),
          React.createElement("div", { className: "note" }, React.createElement("b", null, day.memoTitle), day.memo)
        ))
      );
    }

    function Supplies() {
      return React.createElement("section", null,
        React.createElement("h2", { className: "section-title" }, "준비물 체크리스트"),
        React.createElement("p", { className: "section-kicker" }, "6명 가족여행 기준. 현지에서 사기 쉬운 물건보다 임산부 메모, 개인 상비약, 서류를 먼저 챙깁니다."),
        React.createElement("div", { className: "grid" },
          supplies.map(([title, items, featured]) => React.createElement("article", { className: `card ${featured ? "featured" : ""}`, key: title },
            React.createElement("h3", null, title),
            React.createElement("ul", null, items.map((item) => React.createElement("li", { key: item }, item)))
          ))
        )
      );
    }

    function Board() {
      const [posts, setPosts] = useStoredList("hawaii-board-posts", boardSeed);
      const [form, setForm] = useState({ author: "", category: "일정문의", title: "", content: "" });
      const submit = (event) => {
        event.preventDefault();
        if (!form.title.trim() || !form.content.trim()) return;
        const post = { id: crypto.randomUUID(), ...form, author: form.author.trim() || "가족", createdAt: new Date().toISOString() };
        setPosts([post, ...posts]);
        setForm({ author: form.author, category: form.category, title: "", content: "" });
      };
      return React.createElement("section", null,
        React.createElement("h2", { className: "section-title" }, "가족 게시판"),
        React.createElement("p", { className: "section-kicker" }, "현재 버전은 이 브라우저에 저장됩니다. 가족 전체 공유는 Supabase 연결 후 활성화할 수 있습니다."),
        React.createElement("form", { className: "form", onSubmit: submit },
          React.createElement("div", { className: "form-row" },
            React.createElement("input", { placeholder: "작성자", value: form.author, onChange: (e) => setForm({ ...form, author: e.target.value }) }),
            React.createElement("select", { value: form.category, onChange: (e) => setForm({ ...form, category: e.target.value }) },
              ["일정문의", "맛집", "준비물", "공지"].map((value) => React.createElement("option", { key: value, value }, value))
            )
          ),
          React.createElement("input", { placeholder: "제목", value: form.title, onChange: (e) => setForm({ ...form, title: e.target.value }) }),
          React.createElement("textarea", { placeholder: "내용을 적어주세요", value: form.content, onChange: (e) => setForm({ ...form, content: e.target.value }) }),
          React.createElement("button", { className: "primary-action", type: "submit" }, "글쓰기")
        ),
        posts.length === 0 ? React.createElement("div", { className: "empty" }, "아직 글이 없습니다.") :
          posts.map((post) => React.createElement("article", { className: "post", key: post.id },
            React.createElement("div", { className: "post-meta" },
              React.createElement("span", { className: "category" }, post.category),
              React.createElement("span", null, post.author),
              React.createElement("span", null, new Date(post.createdAt).toLocaleString("ko-KR"))
            ),
            React.createElement("h3", null, post.title),
            React.createElement("p", null, post.content)
          ))
      );
    }

    function Chat() {
      const [messages, setMessages] = useStoredList("hawaii-chat-messages", chatSeed);
      const [form, setForm] = useState({ author: "", content: "" });
      const submit = (event) => {
        event.preventDefault();
        if (!form.content.trim()) return;
        const message = { id: crypto.randomUUID(), author: form.author.trim() || "가족", content: form.content, createdAt: new Date().toISOString() };
        setMessages([...messages, message]);
        setForm({ author: form.author, content: "" });
      };
      return React.createElement("section", null,
        React.createElement("h2", { className: "section-title" }, "가족 채팅"),
        React.createElement("p", { className: "section-kicker" }, "여행 중 빠른 공유용입니다. 지금은 같은 기기/브라우저에서만 보이고, 실시간 가족 공유는 Supabase 연결이 필요합니다."),
        React.createElement("div", null,
          messages.map((message) => React.createElement("div", { className: "chat-message", key: message.id },
            React.createElement("div", { className: "chat-meta" },
              React.createElement("span", null, message.author),
              React.createElement("span", null, new Date(message.createdAt).toLocaleTimeString("ko-KR", { hour: "2-digit", minute: "2-digit" }))
            ),
            React.createElement("div", null, message.content)
          ))
        ),
        React.createElement("form", { className: "form", onSubmit: submit },
          React.createElement("input", { placeholder: "이름", value: form.author, onChange: (e) => setForm({ ...form, author: e.target.value }) }),
          React.createElement("textarea", { placeholder: "메시지", value: form.content, onChange: (e) => setForm({ ...form, content: e.target.value }) }),
          React.createElement("button", { className: "primary-action", type: "submit" }, "보내기")
        )
      );
    }

    function Maps() {
      return React.createElement("section", null,
        React.createElement("h2", { className: "section-title" }, "지도 바로가기"),
        React.createElement("p", { className: "section-kicker" }, "현장에서 많이 열 곳만 모았습니다. 버튼을 누르면 Google Maps 검색으로 연결됩니다."),
        React.createElement("div", { className: "map-hub" },
          mapLinks.map(([label, query]) => React.createElement("a", { className: "map-btn", href: mapUrl(query), target: "_blank", rel: "noopener", key: query }, label))
        )
      );
    }

    function Notes() {
      return React.createElement("section", null,
        React.createElement("h2", { className: "section-title" }, "메모"),
        React.createElement("div", { className: "card" }, "일정은 컨디션에 따라 줄이는 방향을 기본으로 합니다. 긴 이동일에는 아침 출발 전 물, 간식, 화장실 위치, 대체 식당을 먼저 확인합니다."),
        React.createElement("section", { className: "panel" },
          React.createElement("h2", null, "체크포인트"),
          React.createElement("ul", null,
            React.createElement("li", null, "야외 활동은 오전 중심, 한낮에는 실내나 호텔 휴식으로 둡니다."),
            React.createElement("li", null, "긴 하이킹, 거친 보트, zipline, horseback riding, UTV, 무리한 snorkeling은 일정에서 빼고 여유 시간을 둡니다."),
            React.createElement("li", null, "그늘, 화장실, 물, 주차가 쉬운 장소를 우선하고 일정 변경 여지를 남깁니다.")
          )
        )
      );
    }

    function App() {
      const [active, setActive] = useState("schedule");
      const view = {
        schedule: React.createElement(Schedule),
        supplies: React.createElement(Supplies),
        board: React.createElement(Board),
        chat: React.createElement(Chat),
        maps: React.createElement(Maps),
        notes: React.createElement(Notes),
      }[active];
      return React.createElement("main", { className: "shell" },
        React.createElement(Header),
        React.createElement(Tabbar, { active, setActive }),
        view,
        React.createElement("footer", null, "React static app · board/chat store in this browser · Supabase-ready next step")
      );
    }

    createRoot(document.getElementById("root")).render(React.createElement(App));
  </script>
</body>
</html>
